<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LittleTreeTech · 首页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--y1:#fff8d6;--y2:#ffe485;--y3:#ffc833;--y4:#ffb703;--text:#4e3b00;}
    *{box-sizing:border-box} body{margin:0;font-family:"Noto Sans SC",system-ui,sans-serif;background:radial-gradient(circle at 10% 20%,#fff9dc 0,#ffe8a2 40%,#ffc94d 100%);color:var(--text);min-height:100vh;overflow-x:hidden}
    .bg-orb{position:fixed;border-radius:999px;filter:blur(3px);opacity:.35;pointer-events:none;animation:float 8s ease-in-out infinite alternate}
    .o1{width:240px;height:240px;background:#fff0a8;top:-60px;right:10%}
    .o2{width:300px;height:300px;background:#ffd35c;bottom:-100px;left:-40px;animation-delay:1s}
    @keyframes float{to{transform:translateY(24px) translateX(12px)}}
    .wrap{max-width:1060px;margin:0 auto;padding:56px 20px 40px}
    .hero{background:rgba(255,255,255,.55);backdrop-filter:blur(4px);border:2px solid rgba(255,255,255,.7);border-radius:28px;padding:34px;box-shadow:0 20px 40px rgba(146,95,0,.15)}
    h1{margin:0;font-size:44px;line-height:1.1;font-family:"ZCOOL KuaiLe",cursive}
    .subtitle{margin-top:12px;font-size:18px;opacity:.88}
    .cards{margin-top:28px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
    .card{background:#fffaf0;border:1px solid #ffd77d;border-radius:22px;padding:20px;transition:.25s transform,.25s box-shadow;position:relative;overflow:hidden}
    .card:hover{transform:translateY(-6px) rotate(-.4deg);box-shadow:0 14px 26px rgba(0,0,0,.12)}
    .badge{display:inline-block;padding:6px 12px;border-radius:99px;background:#ffe7a8;color:#7b5300;font-weight:700;font-size:12px}
    h2{margin:12px 0 8px;font-size:24px}
    p{margin:0 0 14px;line-height:1.6}
    .btn{display:inline-block;text-decoration:none;background:linear-gradient(135deg,var(--y3),var(--y4));color:#4a3200;font-weight:800;padding:10px 16px;border-radius:12px}
    .tip{margin-top:24px;font-size:13px;opacity:.75}
  </style>
</head>
<body>
  <div class="bg-orb o1"></div>
  <div class="bg-orb o2"></div>
  <main class="wrap">
    <section class="hero">
      <h1>郭子姝 · LittleTreeTech</h1>
      <div class="subtitle">欢迎来到我的个人站点✨ 这里有简历信息与可翻页作品集，点击下方卡片即可进入。</div>
      <div class="cards">
        <article class="card">
          <span class="badge">功能 01</span>
          <h2>个人简历 + 后台管理</h2>
          <p>查看简历页面，或进入后台维护基础信息、作品图片和内容更新。</p>
          <a class="btn" href="/resume">进入简历页</a>
          <a class="btn" style="margin-left:8px" href="/admin">后台管理</a>
        </article>
        <article class="card">
          <span class="badge">功能 02</span>
          <h2>作品集翻页书</h2>
          <p>将《郭作品集3.22.pdf》做成可交互翻页书，每一页都可单独翻阅。</p>
          <a class="btn" href="/portfolio">打开翻页作品集</a>
        </article>
      </div>
      <div class="tip">小互动：把鼠标移动到卡片上会有轻微漂浮效果。</div>
    </section>
  </main>
</body>
</html>
