<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>书法艺术生 · 个人简历</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .title-cn { font-family: "Ma Shan Zheng", cursive; }
  </style>
</head>
<body>
  <div class="ink-bg"></div>
  <main class="wrapper">
    <section class="card hero">
      <div class="photo-wrap">
        <div class="photo-box"><img id="photo" src="" alt="个人照片"/></div>
        <div class="stamp">艺术履历</div>
      </div>
      <div>
        <h1 id="name" class="title-cn"></h1>
        <div id="title" class="subtitle"></div>
        <div id="tagline" class="tagline"></div>
        <div id="about" class="about"></div>
        <div class="specialty-line">擅长书体：<span id="specialty"></span></div>
        <div class="contact">
          <div>📍 <span id="city"></span></div>
          <div>📞 <span id="phone"></span></div>
          <div>✉️ <span id="email"></span></div>
        </div>
      </div>
    </section>

    <section class="sections">
      <article class="card section">
        <h3>专业技能</h3>
        <div id="skills" class="chips"></div>
      </article>

      <article class="card section">
        <h3>教育经历</h3>
        <div id="education"></div>
      </article>

      <article class="card section">
        <h3>经历</h3>
        <div id="projects"></div>
      </article>

      <article class="card section">
        <h3>获奖与荣誉</h3>
        <ul id="awards" style="padding-left: 20px; margin: 0;"></ul>
      </article>
    </section>

    <section class="card section trajectory-section">
      <h3>学习轨迹</h3>
      <div id="trajectory"></div>
    </section>

    <section class="card section work-section">
      <h3>作品集</h3>
      <div id="gallery" class="gallery"></div>
    </section>

    <div class="footer-note">砚池藏月色，纸上见风骨。</div>
  </main>

  <script src="/site.js"></script>
</body>
</html>
